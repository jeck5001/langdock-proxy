<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Langdock Proxy Manager</title>
<style>
  :root {
    --bg: #0f0f12;
    --surface: #1a1a22;
    --surface-2: #24242e;
    --border: #2a2a36;
    --text: #e4e4e7;
    --text-dim: #71717a;
    --accent: #6366f1;
    --accent-hover: #818cf8;
    --success: #22c55e;
    --success-bg: rgba(34,197,94,0.12);
    --danger: #ef4444;
    --danger-bg: rgba(239,68,68,0.12);
    --warning: #f59e0b;
    --warning-bg: rgba(245,158,11,0.12);
    --info: #3b82f6;
    --info-bg: rgba(59,130,246,0.12);
    --radius: 12px;
    --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.4);
    --shadow-lg: 0 10px 40px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  ::selection { background: var(--accent); color: #fff; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* 登录 */
  #login { max-width: 380px; margin: 120px auto; background: var(--surface); padding: 40px; border-radius: 16px; border: 1px solid var(--border); box-shadow: var(--shadow-lg); }
  #login h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  #login p { color: var(--text-dim); font-size: 13px; margin-bottom: 24px; }
  #login input { width: 100%; padding: 12px 14px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; font-size: 14px; color: var(--text); margin-bottom: 16px; outline: none; transition: border-color .2s; }
  #login input:focus { border-color: var(--accent); }
  #login button { width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background .2s; }
  #login button:hover { background: var(--accent-hover); }
  #loginError { color: var(--danger); font-size: 12px; margin-top: 8px; display: none; }

  /* 容器 */
  .container { max-width: 1100px; margin: 0 auto; padding: 24px; }

  /* 头部 */
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  .header h1 { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
  .header h1 .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  .header .actions { display: flex; gap: 8px; }

  /* 按钮 */
  .btn { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all .15s; display: inline-flex; align-items: center; gap: 6px; }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); box-shadow: 0 0 20px rgba(99,102,241,0.3); }
  .btn-ghost { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--border); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #dc2626; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }

  /* 标签页 */
  .tabs { display: flex; gap: 4px; margin-bottom: 24px; background: var(--surface); padding: 4px; border-radius: 10px; border: 1px solid var(--border); width: fit-content; }
  .tab-btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; background: transparent; color: var(--text-dim); transition: all .2s; }
  .tab-btn.active { background: var(--accent); color: #fff; box-shadow: 0 2px 8px rgba(99,102,241,0.3); }
  .tab-btn:hover:not(.active) { color: var(--text); background: var(--surface-2); }

  /* 卡片 */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 12px; transition: border-color .2s, box-shadow .2s; }
  .card:hover { border-color: var(--accent); box-shadow: 0 0 20px rgba(99,102,241,0.08); }

  /* 统计卡片 */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; position: relative; overflow: hidden; }
  .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent); }
  .stat-card.success::before { background: var(--success); }
  .stat-card.danger::before { background: var(--danger); }
  .stat-card.warning::before { background: var(--warning); }
  .stat-card .label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
  .stat-card .value { font-size: 28px; font-weight: 700; }
  .stat-card .value.success { color: var(--success); }
  .stat-card .value.error { color: var(--danger); }

  /* 表格 */
  .table-wrapper { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: auto; max-height: 70vh; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { font-weight: 600; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .5px; padding: 14px 16px; text-align: left; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); }
  td { padding: 12px 16px; border-bottom: 1px solid rgba(42,42,54,0.5); }
  tr:hover td { background: var(--surface-2); }

  /* 徽章 */
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
  .badge-success { background: var(--success-bg); color: var(--success); }
  .badge-success::before { background: var(--success); }
  .badge-error { background: var(--danger-bg); color: var(--danger); }
  .badge-error::before { background: var(--danger); }
  .badge-warning { background: var(--warning-bg); color: var(--warning); }
  .badge-warning::before { background: var(--warning); }
  .badge-info { background: var(--info-bg); color: var(--info); }
  .badge-info::before { background: var(--info); }

  /* 表单 */
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; font-weight: 500; }
  .form-group input, .form-group select { width: 100%; padding: 10px 14px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; font-size: 13px; color: var(--text); outline: none; transition: border-color .2s; }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
  .form-row { display: flex; gap: 12px; }
  .form-row .form-group { flex: 1; }

  /* 模态框 */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 100; }
  .modal-overlay.active { display: flex; align-items: center; justify-content: center; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 480px; max-width: 90vw; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); }
  .modal h2 { font-size: 18px; margin-bottom: 24px; font-weight: 700; }
  .modal .form-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border); }

  /* 代理卡片 */
  .proxy-card { display: flex; justify-content: space-between; align-items: center; }
  .proxy-info .name { font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 10px; }
  .proxy-info .meta { color: var(--text-dim); font-size: 12px; margin-top: 6px; }
  .proxy-info .meta span { margin-right: 12px; }
  .proxy-actions { display: flex; gap: 6px; flex-wrap: wrap; }

  /* 日志面板 */
  .log-panel { background: var(--surface-2); border: 1px solid var(--border); color: var(--text); font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace; font-size: 12px; padding: 16px; border-radius: var(--radius); max-height: 60vh; overflow: auto; line-height: 1.7; }
  .log-panel .entry { padding: 4px 0; border-bottom: 1px solid rgba(42,42,54,0.3); }
  .log-panel .success { color: var(--success); }
  .log-panel .error { color: var(--danger); }
  .log-panel .dim { color: var(--text-dim); }

  /* 健康网格 */
  .health-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; }
  .health-item { display: flex; align-items: center; gap: 14px; padding: 18px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); }
  .health-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .health-icon.ok { background: var(--success-bg); color: var(--success); }
  .health-icon.warn { background: var(--warning-bg); color: var(--warning); }
  .health-icon.error { background: var(--danger-bg); color: var(--danger); }
  .health-item .info .title { font-weight: 600; font-size: 14px; }
  .health-item .info .desc { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

  /* 空状态 */
  .empty { text-align: center; padding: 60px 20px; color: var(--text-dim); }
  .empty .icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
  .empty p { font-size: 14px; }

  /* 响应式 */
  @media (max-width: 640px) {
    .header { flex-direction: column; gap: 12px; align-items: flex-start; }
    .tabs { width: 100%; }
    .tab-btn { flex: 1; text-align: center; }
    .proxy-card { flex-direction: column; gap: 12px; align-items: flex-start; }
    .form-row { flex-direction: column; }
  }
</style>
</head>
<body>

<!-- 登录 -->
<div id="login">
  <h1>Langdock Proxy</h1>
  <p>输入 Token 进入管理界面</p>
  <input type="password" id="tokenInput" placeholder="访问 Token" autofocus>
  <button onclick="doLogin()">进入</button>
  <div id="loginError">Token 无效</div>
</div>

<!-- 主界面 -->
<div id="main" style="display:none;">
  <div class="container">
    <div class="header">
      <h1><span class="dot"></span> Langdock Proxy</h1>
      <div class="actions">
        <button class="btn btn-ghost btn-sm" onclick="refresh()">刷新</button>
        <button class="btn btn-ghost btn-sm" onclick="logout()">退出</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="proxies" onclick="switchTab('proxies')">代理</button>
      <button class="tab-btn" data-tab="models" onclick="switchTab('models')">模型</button>
      <button class="tab-btn" data-tab="health" onclick="switchTab('health')">系统</button>
      <button class="tab-btn" data-tab="logs" onclick="switchTab('logs')">日志</button>
    </div>

    <!-- 代理管理 -->
    <div id="tab-proxies" class="tab-content">
      <div style="display:flex;justify-content:flex-end;margin-bottom:16px;">
        <button class="btn btn-primary btn-sm" onclick="showCreateModal()">+ 新建代理</button>
      </div>
      <div id="proxyList"></div>
      <div id="proxyEmpty" class="empty" style="display:none;"><div class="icon">📡</div><p>还没有代理，点击上方按钮创建第一个</p></div>
    </div>

    <!-- 模型列表 -->
    <div id="tab-models" class="tab-content" style="display:none;">
      <div id="modelList"></div>
    </div>

    <!-- 系统状态 -->
    <div id="tab-health" class="tab-content" style="display:none;">
      <div id="healthContent"></div>
    </div>

    <!-- 日志 -->
    <div id="tab-logs" class="tab-content" style="display:none;">
      <div style="display:flex;justify-content:flex-end;margin-bottom:16px;">
        <button class="btn btn-primary btn-sm" onclick="refreshLogs()">刷新</button>
      </div>
      <div id="logStats" class="stats-grid"></div>
      <div id="logContent" class="log-panel" style="min-height:200px;">加载中...</div>
    </div>
  </div>
</div>

<!-- 模态框: 创建/编辑代理 -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h2 id="editTitle">新建代理</h2>
    <input type="hidden" id="editId">
    <div class="form-group">
      <label>名称</label>
      <input type="text" id="f_name" placeholder="langdock">
    </div>
    <div class="form-group">
      <label>目标 URL</label>
      <input type="text" id="f_target" placeholder="https://app.langdock.com">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>端口</label>
        <input type="number" id="f_port" value="3001">
      </div>
      <div class="form-group">
        <label>路径前缀</label>
        <input type="text" id="f_prefix" placeholder="/langdock">
      </div>
    </div>
    <div class="form-group">
      <label>Cookie Domain (可选)</label>
      <input type="text" id="f_cookieDomain" placeholder="留空则用请求 Host">
    </div>
    <div class="form-group">
      <label>重写响应体 URL</label>
      <select id="f_rewriteBody">
        <option value="true">是</option>
        <option value="false">否</option>
      </select>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal('editModal')">取消</button>
      <button class="btn btn-primary" onclick="saveProxy()">保存</button>
    </div>
  </div>
</div>

<!-- 模态框: 日志详情 -->
<div class="modal-overlay" id="logModal">
  <div class="modal" style="width:700px;">
    <h2>日志详情</h2>
    <div id="logDetail" class="log-panel" style="max-height:70vh;"></div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal('logModal')">关闭</button>
    </div>
  </div>
</div>

<script>
let token = localStorage.getItem('mgr_token') || '';
let currentTab = 'proxies';

// ---------- API ----------
async function api(method, path, body) {
  const opts = { method, headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch('/api' + path, opts);
  if (r.status === 401) { logout(); throw new Error('unauthorized'); }
  return r.json();
}

// ---------- 登录 ----------
async function doLogin() {
  token = document.getElementById('tokenInput').value.trim();
  if (!token) return;
  try {
    const r = await fetch('/api/auth/verify', { headers: { 'Authorization': 'Bearer ' + token } });
    if (r.ok) {
      localStorage.setItem('mgr_token', token);
      showMain();
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  } catch { document.getElementById('loginError').style.display = 'block'; }
}

function logout() {
  token = '';
  localStorage.removeItem('mgr_token');
  document.getElementById('main').style.display = 'none';
  document.getElementById('login').style.display = 'block';
  document.getElementById('tokenInput').value = '';
}

function showMain() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('main').style.display = 'block';
  switchTab('proxies');
}

// ---------- 标签页 ----------
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.tab-btn[data-tab="' + tab + '"]').classList.add('active');
  document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
  document.getElementById('tab-' + tab).style.display = 'block';
  if (tab === 'proxies') loadProxies();
  if (tab === 'models') loadModels();
  if (tab === 'health') loadHealth();
  if (tab === 'logs') refreshLogs();
}
function refresh() { switchTab(currentTab); }

// ---------- 代理管理 ----------
async function loadProxies() {
  const list = document.getElementById('proxyList');
  const empty = document.getElementById('proxyEmpty');
  try {
    const data = await api('GET', '/proxies');
    if (!data.proxies || !data.proxies.length) { list.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    list.innerHTML = data.proxies.map(p => {
      const s = p.status || {};
      const running = s.running;
      const badge = running ? '<span class="badge badge-success">运行中</span>' : '<span class="badge badge-warning">已停止</span>';
      return '<div class="card"><div class="proxy-card"><div class="proxy-info">' +
        '<div class="name">' + esc(p.name) + ' ' + badge + '</div>' +
        '<div class="meta"><span>→ ' + esc(p.target) + '</span><span>:' + p.port + '</span>' +
        (p.prefix ? ' <span>' + esc(p.prefix) + '</span>' : '') + '</div>' +
        '</div><div class="proxy-actions">' +
        (running
          ? '<button class="btn btn-ghost btn-sm" onclick="proxyAction(\'' + p.id + '\',\'stop\')">停止</button>'
          : '<button class="btn btn-primary btn-sm" onclick="proxyAction(\'' + p.id + '\',\'start\')">启动</button>') +
        '<button class="btn btn-ghost btn-sm" onclick="proxyAction(\'' + p.id + '\',\'restart\')">重启</button>' +
        '<button class="btn btn-ghost btn-sm" onclick="editProxy(\'' + p.id + '\')">编辑</button>' +
        '<button class="btn btn-danger btn-sm" onclick="deleteProxy(\'' + p.id + '\',\'' + esc(p.name) + '\')">删除</button>' +
        '</div></div></div>';
    }).join('');
  } catch (e) { list.innerHTML = '<div class="empty"><p>加载失败: ' + e.message + '</p></div>'; }
}

async function proxyAction(id, action) {
  try { await api('POST', '/proxies/' + id + '/' + action); loadProxies(); } catch (e) { alert(e.message); }
}
async function deleteProxy(id, name) {
  if (!confirm('确定删除 ' + name + ' ?')) return;
  try { await api('DELETE', '/proxies/' + id); loadProxies(); } catch (e) { alert(e.message); }
}
function showCreateModal() {
  document.getElementById('editTitle').textContent = '新建代理';
  document.getElementById('editId').value = '';
  document.getElementById('f_name').value = '';
  document.getElementById('f_target').value = '';
  document.getElementById('f_port').value = '3001';
  document.getElementById('f_prefix').value = '';
  document.getElementById('f_cookieDomain').value = '';
  document.getElementById('f_rewriteBody').value = 'true';
  openModal('editModal');
}
async function editProxy(id) {
  try {
    const data = await api('GET', '/proxies/' + id);
    const p = data.proxy || data;
    document.getElementById('editTitle').textContent = '编辑代理';
    document.getElementById('editId').value = p.id;
    document.getElementById('f_name').value = p.name;
    document.getElementById('f_target').value = p.target;
    document.getElementById('f_port').value = p.port;
    document.getElementById('f_prefix').value = p.prefix || '';
    document.getElementById('f_cookieDomain').value = p.cookieDomain || '';
    document.getElementById('f_rewriteBody').value = String(p.rewriteBody !== false);
    openModal('editModal');
  } catch (e) { alert(e.message); }
}
async function saveProxy() {
  const id = document.getElementById('editId').value;
  const body = {
    name: document.getElementById('f_name').value.trim(),
    target: document.getElementById('f_target').value.trim(),
    port: parseInt(document.getElementById('f_port').value, 10),
    prefix: document.getElementById('f_prefix').value.trim(),
    cookieDomain: document.getElementById('f_cookieDomain').value.trim(),
    rewriteBody: document.getElementById('f_rewriteBody').value === 'true',
  };
  if (!body.name || !body.target) { alert('名称和目标必填'); return; }
  try {
    if (id) await api('PUT', '/proxies/' + id, body);
    else await api('POST', '/proxies', body);
    closeModal('editModal'); loadProxies();
  } catch (e) { alert(e.message); }
}

// ---------- 模型列表 ----------
async function loadModels() {
  const list = document.getElementById('modelList');
  list.innerHTML = '<div class="empty"><div class="icon">⏳</div><p>加载中...</p></div>';
  try {
    const data = await api('GET', '/v1/models');
    if (!data.data || !data.data.length) {
      list.innerHTML = '<div class="empty"><div class="icon">🤖</div><p>暂无模型</p></div>';
      return;
    }
    const byProvider = {};
    data.data.forEach(m => {
      const k = m.owned_by || '其他';
      if (!byProvider[k]) byProvider[k] = [];
      byProvider[k].push(m);
    });
    let html = '';
    for (const [provider, models] of Object.entries(byProvider)) {
      html += '<div class="card" style="margin-bottom:16px;"><h3 style="font-size:14px;margin-bottom:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;">' + esc(provider) + ' <span style="font-weight:400;font-size:12px;">(' + models.length + ')</span></h3><div class="table-wrapper" style="border:none;"><table><tbody>';
      models.forEach(m => {
        html += '<tr><td><code style="background:var(--surface-2);padding:2px 8px;border-radius:4px;font-size:12px;">' + esc(m.id) + '</code></td><td style="color:var(--text-dim);">' + esc(m.display_name || '-') + '</td></tr>';
      });
      html += '</tbody></table></div></div>';
    }
    list.innerHTML = html;
  } catch (e) { list.innerHTML = '<div class="empty"><div class="icon">❌</div><p>加载失败: ' + e.message + '</p></div>'; }
}

// ---------- 系统状态 ----------
async function loadHealth() {
  const content = document.getElementById('healthContent');
  content.innerHTML = '<div class="empty"><div class="icon">⏳</div><p>检查中...</p></div>';
  try {
    const health = await api('GET', '/bridge/health');
    const langOk = health.langdock?.reachable;
    const cookieOk = health.langdock?.configured;
    const uptimeMin = Math.floor(health.uptime / 60);
    content.innerHTML = '<div class="health-grid">' +
      '<div class="health-item"><div class="health-icon ' + (langOk ? 'ok' : 'error') + '">' + (langOk ? '✓' : '✗') + '</div><div class="info"><div class="title">Langdock 连接</div><div class="desc">' + (langOk ? '正常' : (cookieOk ? '不可达' : '未配置')) + '</div></div></div>' +
      '<div class="health-item"><div class="health-icon ' + (cookieOk ? 'ok' : 'warn') + '">' + (cookieOk ? '✓' : '?') + '</div><div class="info"><div class="title">Cookie</div><div class="desc">' + (cookieOk ? '已配置' : '未配置') + '</div></div></div>' +
      '<div class="health-item"><div class="health-icon ok">⏱</div><div class="info"><div class="title">运行时间</div><div class="desc">' + uptimeMin + ' 分钟</div></div></div>' +
      '</div>';
  } catch (e) { content.innerHTML = '<div class="empty"><div class="icon">❌</div><p>检查失败: ' + e.message + '</p></div>'; }
}

// ---------- 日志 ----------
async function refreshLogs() {
  try {
    const data = await api('GET', '/bridge/logs?limit=200');
    const stats = data.stats || {};
    document.getElementById('logStats').innerHTML =
      '<div class="stat-card"><div class="label">总调用</div><div class="value">' + (stats.total || 0) + '</div></div>' +
      '<div class="stat-card success"><div class="label">成功</div><div class="value success">' + (stats.success || 0) + '</div></div>' +
      '<div class="stat-card danger"><div class="label">失败</div><div class="value error">' + (stats.errors || 0) + '</div></div>' +
      '<div class="stat-card warning"><div class="label">平均耗时</div><div class="value">' + (stats.avgDuration || 0) + 'ms</div></div>';
    const logs = data.logs || [];
    const content = document.getElementById('logContent');
    if (!logs.length) { content.innerHTML = '<div class="empty"><div class="icon">📋</div><p>暂无日志</p></div>'; return; }
    content.innerHTML = logs.map(l => {
      const time = l.timestamp ? new Date(l.timestamp).toLocaleString() : '-';
      const cls = l.status === 'success' ? 'success' : l.status === 'error' ? 'error' : 'dim';
      const icon = l.status === 'success' ? '✓' : l.status === 'error' ? '✗' : '…';
      return '<div class="entry"><span class="' + cls + '">' + icon + '</span> <span class="dim">' + time + '</span> ' +
        '<span>' + esc(l.endpoint || '-') + '</span> ' +
        '<span>' + esc(l.model || '-') + '</span> ' +
        '<span class="dim">' + (l.messageCount || 0) + ' msgs</span> ' +
        '<span class="dim">' + (l.duration || 0) + 'ms</span>' +
        (l.error ? ' <span style="color:var(--danger);">' + esc(l.error.slice(0, 80)) + '</span>' : '') +
        '</div>';
    }).join('');
  } catch (e) { document.getElementById('logContent').innerHTML = '<div class="empty">加载失败: ' + e.message + '</div>'; }
}

// ---------- 模态框 ----------
function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) closeModal(o.id); });
});

// ---------- 工具 ----------
function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ---------- 初始化 ----------
if (token) {
  fetch('/api/auth/verify', { headers: { 'Authorization': 'Bearer ' + token } })
    .then(r => { if (r.ok) showMain(); else logout(); })
    .catch(() => logout());
}
document.getElementById('tokenInput').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
