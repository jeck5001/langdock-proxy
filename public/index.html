<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Langdock Proxy Manager</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f6fa; color: #2d3436; }
  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
  #login { max-width: 360px; margin: 80px auto; background: #fff; padding: 32px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  #login h1 { font-size: 20px; margin-bottom: 8px; }
  #login p { color: #636e72; font-size: 13px; margin-bottom: 20px; }
  #login input { width: 100%; padding: 10px 12px; border: 1px solid #dfe6e9; border-radius: 6px; font-size: 14px; margin-bottom: 12px; }
  #login button { width: 100%; padding: 10px; background: #0984e3; color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
  #login button:hover { background: #0748a8; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .header h1 { font-size: 22px; }
  .header .actions { display: flex; gap: 8px; }
  .btn { padding: 8px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .btn-primary { background: #0984e3; color: #fff; }
  .btn-primary:hover { background: #0748a8; }
  .btn-ghost { background: #e9ecef; color: #495057; }
  .btn-ghost:hover { background: #dee2e6; }
  .btn-danger { background: #dc3545; color: #fff; }
  .btn-sm { padding: 6px 10px; font-size: 12px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab-btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; background: #e9ecef; color: #495057; }
  .tab-btn.active { background: #0984e3; color: #fff; }
  .tab-btn:hover:not(.active) { background: #dee2e6; }
  .card { background: #fff; border-radius: 10px; padding: 16px 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); margin-bottom: 12px; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: #fff; padding: 16px; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .stat-card .label { font-size: 11px; color: #6c757d; text-transform: uppercase; }
  .stat-card .value { font-size: 24px; font-weight: 600; margin-top: 4px; }
  .stat-card .value.success { color: #28a745; }
  .stat-card .value.error { color: #dc3545; }
  .table-wrapper { background: #fff; border-radius: 10px; overflow: auto; max-height: 70vh; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { font-weight: 600; font-size: 12px; color: #6c757d; text-transform: uppercase; padding: 12px; text-align: left; border-bottom: 2px solid #e9ecef; position: sticky; top: 0; background: #fff; }
  td { padding: 10px 12px; border-bottom: 1px solid #f1f3f5; }
  tr:hover { background: #f8f9fa; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .badge-success { background: #d4edda; color: #155724; }
  .badge-error { background: #f8d7da; color: #721c24; }
  .badge-warning { background: #fff3cd; color: #856404; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; color: #636e72; margin-bottom: 4px; }
  .form-group input, .form-group select { width: 100%; padding: 10px 12px; border: 1px solid #dfe6e9; border-radius: 6px; font-size: 13px; }
  .form-group input:focus { outline: none; border-color: #0984e3; }
  .form-row { display: flex; gap: 12px; }
  .form-row .form-group { flex: 1; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; }
  .modal-overlay.active { display: flex; align-items: center; justify-content: center; }
  .modal { background: #fff; border-radius: 12px; padding: 24px; width: 500px; max-width: 90vw; max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-size: 18px; margin-bottom: 20px; }
  .modal .form-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
  .proxy-card { display: flex; justify-content: space-between; align-items: center; }
  .proxy-info .name { font-weight: 600; font-size: 15px; }
  .proxy-info .meta { color: #636e72; font-size: 12px; margin-top: 4px; }
  .proxy-info .meta span { margin-right: 12px; }
  .proxy-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .log-panel { background: #1e272e; color: #d2d9db; font-family: "SF Mono", Menlo, monospace; font-size: 12px; padding: 16px; border-radius: 10px; max-height: 60vh; overflow: auto; white-space: pre-wrap; word-break: break-all; line-height: 1.6; }
  .health-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .health-item { display: flex; align-items: center; gap: 8px; padding: 12px; background: #fff; border-radius: 8px; }
  .health-dot { width: 10px; height: 10px; border-radius: 50%; }
  .health-dot.ok { background: #28a745; }
  .health-dot.warn { background: #ffc107; }
  .health-dot.error { background: #dc3545; }
  .empty { text-align: center; color: #b2bec3; padding: 40px 20px; }
</style>
</head>
<body>

<!-- 登录 -->
<div id="login">
  <h1>Langdock Proxy</h1>
  <p>输入访问 Token 登录</p>
  <input type="password" id="tokenInput" placeholder="Token" autofocus>
  <button onclick="doLogin()">登录</button>
  <div id="loginError" style="color:#dc3545;font-size:12px;margin-top:8px;display:none;">Token 无效</div>
</div>

<!-- 主界面 -->
<div id="main" style="display:none;">
  <div class="container">
    <div class="header">
      <h1>Langdock Proxy</h1>
      <div class="actions">
        <button class="btn btn-ghost btn-sm" onclick="refresh()">刷新</button>
        <button class="btn btn-ghost btn-sm" onclick="logout()">退出</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="proxies" onclick="switchTab('proxies')">代理管理</button>
      <button class="tab-btn" data-tab="models" onclick="switchTab('models')">模型</button>
      <button class="tab-btn" data-tab="health" onclick="switchTab('health')">系统</button>
      <button class="tab-btn" data-tab="logs" onclick="switchTab('logs')">日志</button>
    </div>

    <!-- 代理管理 -->
    <div id="tab-proxies" class="tab-content">
      <div style="display:flex;justify-content:flex-end;margin-bottom:12px;">
        <button class="btn btn-primary btn-sm" onclick="showCreateModal()">+ 新建代理</button>
      </div>
      <div id="proxyList"></div>
      <div id="proxyEmpty" class="empty" style="display:none;">还没有代理</div>
    </div>

    <!-- 模型列表 -->
    <div id="tab-models" class="tab-content" style="display:none;">
      <div id="modelList"></div>
    </div>

    <!-- 系统状态 -->
    <div id="tab-health" class="tab-content" style="display:none;">
      <div id="healthContent"></div>
    </div>

    <!-- 日志 -->
    <div id="tab-logs" class="tab-content" style="display:none;">
      <div style="display:flex;justify-content:flex-end;margin-bottom:12px;">
        <button class="btn btn-primary btn-sm" onclick="refreshLogs()">刷新</button>
      </div>
      <div id="logStats" class="stats-grid"></div>
      <div id="logContent" class="log-panel" style="min-height:200px;">加载中...</div>
    </div>
  </div>
</div>

<!-- 新建/编辑代理模态 -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h2 id="editTitle">新建代理</h2>
    <input type="hidden" id="editId">
    <div class="form-group">
      <label>名称</label>
      <input type="text" id="f_name" placeholder="langdock">
    </div>
    <div class="form-group">
      <label>目标 URL</label>
      <input type="text" id="f_target" placeholder="https://app.langdock.com">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>端口</label>
        <input type="number" id="f_port" value="3001">
      </div>
      <div class="form-group">
        <label>路径前缀</label>
        <input type="text" id="f_prefix" placeholder="/langdock">
      </div>
    </div>
    <div class="form-group">
      <label>Cookie Domain (可选)</label>
      <input type="text" id="f_cookieDomain" placeholder="chat.mydomain.com">
    </div>
    <div class="form-group">
      <label>重写响应体 URL</label>
      <select id="f_rewriteBody">
        <option value="true">是</option>
        <option value="false">否</option>
      </select>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal('editModal')">取消</button>
      <button class="btn btn-primary" onclick="saveProxy()">保存</button>
    </div>
  </div>
</div>

<!-- 日志详情模态 -->
<div class="modal-overlay" id="logModal">
  <div class="modal" style="width:700px;">
    <h2>日志详情</h2>
    <div id="logDetail" class="log-panel" style="max-height:70vh;"></div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal('logModal')">关闭</button>
    </div>
  </div>
</div>

<script>
let token = localStorage.getItem('mgr_token') || '';
let currentTab = 'proxies';

// ---------- API ----------
async function api(method, path, body) {
  const opts = { method, headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch('/api' + path, opts);
  if (r.status === 401) { logout(); throw new Error('unauthorized'); }
  return r.json();
}

// ---------- 登录 ----------
async function doLogin() {
  token = document.getElementById('tokenInput').value.trim();
  if (!token) return;
  try {
    const r = await fetch('/api/auth/verify', { headers: { 'Authorization': 'Bearer ' + token } });
    if (r.ok) {
      localStorage.setItem('mgr_token', token);
      showMain();
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  } catch { document.getElementById('loginError').style.display = 'block'; }
}

function logout() {
  token = '';
  localStorage.removeItem('mgr_token');
  document.getElementById('main').style.display = 'none';
  document.getElementById('login').style.display = 'block';
  document.getElementById('tokenInput').value = '';
}

function showMain() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('main').style.display = 'block';
  switchTab('proxies');
}

// ---------- 标签页切换 ----------
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('active');
  document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
  document.getElementById('tab-' + tab).style.display = 'block';
  if (tab === 'proxies') loadProxies();
  if (tab === 'models') loadModels();
  if (tab === 'health') loadHealth();
  if (tab === 'logs') refreshLogs();
}

function refresh() { switchTab(currentTab); }

// ---------- 代理管理 ----------
async function loadProxies() {
  const list = document.getElementById('proxyList');
  const empty = document.getElementById('proxyEmpty');
  try {
    const data = await api('GET', '/proxies');
    if (!data.proxies || !data.proxies.length) {
      list.innerHTML = ''; empty.style.display = 'block'; return;
    }
    empty.style.display = 'none';
    list.innerHTML = data.proxies.map(p => {
      const s = p.status || {};
      const running = s.running;
      const badge = running ? '<span class="badge badge-success">运行中</span>' : '<span class="badge badge-warning">已停止</span>';
      return `<div class="card"><div class="proxy-card"><div class="proxy-info">
        <div class="name">${esc(p.name)} ${badge}</div>
        <div class="meta"><span>→ ${esc(p.target)}</span><span>:${p.port}</span>${p.prefix ? ' <span>'+esc(p.prefix)+'</span>' : ''}</div>
      </div><div class="proxy-actions">
        ${running ? `<button class="btn btn-ghost btn-sm" onclick="proxyAction('${p.id}','stop')">停止</button>` : `<button class="btn btn-primary btn-sm" onclick="proxyAction('${p.id}','start')">启动</button>`}
        <button class="btn btn-ghost btn-sm" onclick="proxyAction('${p.id}','restart')">重启</button>
        <button class="btn btn-ghost btn-sm" onclick="editProxy('${p.id}')">编辑</button>
        <button class="btn btn-danger btn-sm" onclick="deleteProxy('${p.id}','${esc(p.name)}')">删除</button>
      </div></div></div>`;
    }).join('');
  } catch (e) { list.innerHTML = `<div class="empty">加载失败: ${e.message}</div>`; }
}

async function proxyAction(id, action) {
  try { await api('POST', `/proxies/${id}/${action}`); loadProxies(); } catch (e) { alert(e.message); }
}

async function deleteProxy(id, name) {
  if (!confirm('确定删除 ' + name + ' ?')) return;
  try { await api('DELETE', '/proxies/' + id); loadProxies(); } catch (e) { alert(e.message); }
}

function showCreateModal() {
  document.getElementById('editTitle').textContent = '新建代理';
  document.getElementById('editId').value = '';
  document.getElementById('f_name').value = '';
  document.getElementById('f_target').value = '';
  document.getElementById('f_port').value = '3001';
  document.getElementById('f_prefix').value = '';
  document.getElementById('f_cookieDomain').value = '';
  document.getElementById('f_rewriteBody').value = 'true';
  openModal('editModal');
}

async function editProxy(id) {
  try {
    const data = await api('GET', '/proxies/' + id);
    const p = data.proxy || data;
    document.getElementById('editTitle').textContent = '编辑代理';
    document.getElementById('editId').value = p.id;
    document.getElementById('f_name').value = p.name;
    document.getElementById('f_target').value = p.target;
    document.getElementById('f_port').value = p.port;
    document.getElementById('f_prefix').value = p.prefix || '';
    document.getElementById('f_cookieDomain').value = p.cookieDomain || '';
    document.getElementById('f_rewriteBody').value = String(p.rewriteBody !== false);
    openModal('editModal');
  } catch (e) { alert(e.message); }
}

async function saveProxy() {
  const id = document.getElementById('editId').value;
  const body = {
    name: document.getElementById('f_name').value.trim(),
    target: document.getElementById('f_target').value.trim(),
    port: parseInt(document.getElementById('f_port').value, 10),
    prefix: document.getElementById('f_prefix').value.trim(),
    cookieDomain: document.getElementById('f_cookieDomain').value.trim(),
    rewriteBody: document.getElementById('f_rewriteBody').value === 'true',
  };
  if (!body.name || !body.target) { alert('名称和目标必填'); return; }
  try {
    if (id) await api('PUT', '/proxies/' + id, body);
    else await api('POST', '/proxies', body);
    closeModal('editModal'); loadProxies();
  } catch (e) { alert(e.message); }
}

// ---------- 模型列表 ----------
async function loadModels() {
  const list = document.getElementById('modelList');
  list.innerHTML = '<div class="empty">加载中...</div>';
  try {
    const data = await api('GET', '/v1/models');
    list.innerHTML = `<div class="table-wrapper"><table>
      <thead><tr><th>模型 ID</th><th>显示名</th><th>提供商</th></tr></thead>
      <tbody>${data.data.map(m => `<tr>
        <td><code>${esc(m.id)}</code></td>
        <td>${esc(m.display_name || '-')}</td>
        <td>${esc(m.owned_by)}</td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  } catch (e) { list.innerHTML = `<div class="empty">加载失败: ${e.message}</div>`; }
}

// ---------- 系统状态 ----------
async function loadHealth() {
  const content = document.getElementById('healthContent');
  content.innerHTML = '<div class="empty">检查中...</div>';
  try {
    const health = await api('GET', '/bridge/health');
    const dot = health.langdock?.reachable ? 'ok' : (health.langdock?.configured ? 'error' : 'warn');
    const dotLabel = health.langdock?.reachable ? '正常' : (health.langdock?.configured ? '不可达' : '未配置');
    content.innerHTML = `
      <div class="health-grid">
        <div class="health-item"><div class="health-dot ${dot}"></div><div><div style="font-weight:600;">Langdock 连接</div><div style="font-size:12px;color:#636e72;">${dotLabel}</div></div></div>
        <div class="health-item"><div class="health-dot ${health.langdock?.configured ? 'ok' : 'warn'}"></div><div><div style="font-weight:600;">Cookie</div><div style="font-size:12px;color:#636e72;">${health.langdock?.configured ? '已配置' : '未配置'}</div></div></div>
        <div class="health-item"><div class="health-dot ok"></div><div><div style="font-weight:600;">运行时间</div><div style="font-size:12px;color:#636e72;">${Math.floor(health.uptime / 60)} 分钟</div></div></div>
      </div>
    `;
  } catch (e) { content.innerHTML = `<div class="empty">检查失败: ${e.message}</div>`; }
}

// ---------- 日志 ----------
async function refreshLogs() {
  try {
    const data = await api('GET', '/bridge/logs?limit=200');
    const stats = data.stats || {};
    document.getElementById('logStats').innerHTML = `
      <div class="stat-card"><div class="label">总调用</div><div class="value">${stats.total || 0}</div></div>
      <div class="stat-card"><div class="label">成功</div><div class="value success">${stats.success || 0}</div></div>
      <div class="stat-card"><div class="label">失败</div><div class="value error">${stats.errors || 0}</div></div>
      <div class="stat-card"><div class="label">平均耗时</div><div class="value">${stats.avgDuration || 0}ms</div></div>
    `;
    const logs = data.logs || [];
    const content = document.getElementById('logContent');
    if (!logs.length) { content.innerHTML = '<div class="empty">暂无日志</div>'; return; }
    content.innerHTML = logs.map(l => {
      const time = l.timestamp ? new Date(l.timestamp).toLocaleString() : '-';
      const status = l.status === 'success' ? '✅' : l.status === 'error' ? '❌' : '⏳';
      return `<div>${status} ${time} | ${l.endpoint || '-'} | ${l.model || '-'} | ${l.messageCount || 0} msgs | ${l.duration || 0}ms${l.error ? ' | ' + esc(l.error.slice(0,80)) : ''}</div>`;
    }).join('');
  } catch (e) { document.getElementById('logContent').innerHTML = '加载失败: ' + e.message; }
}

// ---------- 模态框 ----------
function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

// 点击背景关闭
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) closeModal(o.id); });
});

// ---------- 工具函数 ----------
function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ---------- 初始化 ----------
if (token) {
  fetch('/api/auth/verify', { headers: { 'Authorization': 'Bearer ' + token } })
    .then(r => { if (r.ok) showMain(); else logout(); })
    .catch(() => logout());
}

document.getElementById('tokenInput').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
