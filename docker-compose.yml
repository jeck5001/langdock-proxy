services:
  # Langdock Proxy — 一个服务, 同时提供:
  #   1. 反代管理 (Web UI + REST API, 端口 8080 的 / 和 /api/*)
  #   2. LLM Bridge (OpenAI/Claude/Codex 兼容 API, 端口 8080 的 /v1/*)
  # 客户端用同一个 MANAGER_TOKEN 当 Bearer token, 既能管理又能调 LLM
  langdock:
    image: ghcr.io/jeck5001/langdock-proxy-manager:latest
    container_name: langdock-proxy
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MANAGER_PORT: "8080"
      # 访问 token: 既是管理 UI 的登录密码, 也是 LLM API 的 Bearer token
      MANAGER_TOKEN: "${MANAGER_TOKEN:-changeme}"
      DATA_DIR: "/data"
      PROXY_IMAGE: "ghcr.io/jeck5001/langdock-proxy:latest"
      # Langdock Cookie (从浏览器抓, 用于 LLM Bridge 调用 app.langdock.com)
      LANGDOCK_COOKIE: "${LANGDOCK_COOKIE:-}"
      DEBUG: "${DEBUG:-0}"
    volumes:
      # docker.sock: 管理反代容器需要; 不用反代管理功能也无所谓, 挂上不碍事
      - /var/run/docker.sock:/var/run/docker.sock
      # 配置持久化
      - ./data:/data
