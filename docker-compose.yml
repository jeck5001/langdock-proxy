services:
  # LLM Bridge — 把 Langdock 账号转成 OpenAI/Claude/Codex 兼容 API
  # 在 Claude Code / Codex / Cursor 里配置成 Base URL 即可使用
  bridge:
    image: ghcr.io/jeck5001/langdock-proxy-manager:latest
    container_name: langdock-bridge
    restart: unless-stopped
    ports:
      - "8963:8963"
    environment:
      BRIDGE_PORT: "8963"
      # 必填: 从 app.langdock.com 浏览器抓取 Cookie (F12 → Network → /api/engine → Cookie 头)
      LANGDOCK_COOKIE: "${LANGDOCK_COOKIE}"
      # 可选: 保护 API 的 token (不填则不校验; 客户端 Authorization: Bearer <token>)
      BRIDGE_TOKEN: "${BRIDGE_TOKEN:-}"
      DEBUG: "${DEBUG:-0}"
    command: ["node", "bridge.js"]

  # 反代管理平台 (可选, 默认不启动)
  # 想用 Web UI 管多个反代容器时, 加 --profile manager 启动:
  #   docker compose --profile manager up -d
  manager:
    image: ghcr.io/jeck5001/langdock-proxy-manager:latest
    container_name: langdock-proxy-manager
    profiles: ["manager"]
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MANAGER_PORT: "8080"
      MANAGER_TOKEN: "${MANAGER_TOKEN:-changeme}"
      DATA_DIR: "/data"
      PROXY_IMAGE: "ghcr.io/jeck5001/langdock-proxy:latest"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data
    command: ["node", "manager.js"]
