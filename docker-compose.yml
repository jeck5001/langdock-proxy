# Langdock Proxy Manager
# -----------------------
# 在 NAS 上部署: 只需 docker compose up -d, 镜像从 ghcr.io 拉取
#
# 前置: 需要设置 MANAGER_TOKEN 环境变量 (或改下面的值)
#   export MANAGER_TOKEN="your-strong-password"
# 或直接编辑下面的 MANAGER_TOKEN 行

services:
  manager:
    image: ghcr.io/jeck5001/langdock-proxy-manager:latest
    container_name: langdock-proxy-manager
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MANAGER_PORT: "8080"
      # 访问 token — 务必改成你自己的强密码!
      MANAGER_TOKEN: "${MANAGER_TOKEN:-changeme-please}"
      DATA_DIR: "/data"
      # manager 用这个镜像创建反代容器 (和下面 proxy 服务用的同一个镜像)
      PROXY_IMAGE: "ghcr.io/jeck5001/langdock-proxy:latest"
    volumes:
      # 挂载 docker.sock, 让 manager 能控制宿主 Docker
      - /var/run/docker.sock:/var/run/docker.sock
      # 配置持久化 (proxies.json)
      - ./data:/data

  # 反代引擎镜像 (manager 用它创建每个代理实例)
  # 这个服务本身不运行, 只是声明镜像来源, 方便预拉取:
  #   docker compose --profile pull pull
  # 真正的反代容器由 manager 通过 dockerode 动态创建
  proxy-image:
    image: ghcr.io/jeck5001/langdock-proxy:latest
    profiles: ["pull"]
    command: ["echo", "image pulled"]
