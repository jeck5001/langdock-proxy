services:
  # Langdock Proxy — 一个服务, 同时提供:
  #   1. 反代管理 (Web UI + REST API, 端口 8080 的 / 和 /api/*)
  #   2. LLM Bridge (OpenAI/Claude/Codex 兼容 API, 端口 8080 的 /v1/*)
  # 客户端用同一个 MANAGER_TOKEN 当 Bearer token, 既能管理又能调 LLM
  langdock:
    image: ghcr.io/jeck5001/langdock-proxy-manager:latest
    container_name: langdock-proxy
    restart: unless-stopped
    ports:
      - "8500:8080"
    environment:
      MANAGER_PORT: "8080"
      MANAGER_TOKEN: "${MANAGER_TOKEN:-changeme}"
      DATA_DIR: "/data"
      PROXY_IMAGE: "ghcr.io/jeck5001/langdock-proxy:latest"
      LANGDOCK_COOKIE: "${LANGDOCK_COOKIE:-}"
      # Agent 工作目录 (Read/Write/Bash 在此目录下执行)
      # 改成你想让 Codex/Claude Code 访问的项目目录
      WORKSPACE: "/workspace"
      DEBUG: "${DEBUG:-0}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data
      # 挂载你的项目目录到 /workspace
      # 改成你实际路径, 例如:
      #   - /Users/jfwang/IdeaProjects/javaTool:/workspace
      #   - /home/user/projects:/workspace
      # 或挂载 NAS 上的常用目录:
      #   - /vol1/1000/projects:/workspace
      - ./:/workspace
